<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Workshop — Billy Daws</title>
    <meta name="description" content="Billy Daws' personal workshop dashboard — podcast, budget, AI, sermon study, news, and trends, all in one place.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">

    <!-- Convex client (optional): powers cross-device sync of custom areas.
         If it fails to load or the backend isn't reachable, the workshop
         falls back to browser-only storage and keeps working. -->
    <script type="module">
        try {
            const { ConvexHttpClient } = await import("https://esm.sh/convex@1.16.4/browser");
            window.convexClient = new ConvexHttpClient("https://tame-fennec-574.convex.cloud");
        } catch (e) {
            console.warn("Convex client unavailable — using local storage only.", e);
        } finally {
            // Signal the main script that the client has settled (loaded or not).
            window.dispatchEvent(new Event("convex-ready"));
        }
    </script>

    <style>
        /* ==================== */
        /* Workshop Dashboard */
        /* ==================== */

        .workshop-header {
            text-align: center;
            color: white;
            max-width: 1100px;
            margin: 10px auto 40px;
            position: relative;
            z-index: 1;
        }

        .workshop-eyebrow {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            font-weight: 600;
        }

        .workshop-title {
            font-size: 3.2rem;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .workshop-subtitle {
            font-size: 1.25rem;
            opacity: 0.95;
            font-style: italic;
        }

        /* Cross-device sync bar */
        .sync-bar {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-height: 44px;
        }

        .sync-toggle {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-family: 'Georgia', serif;
            font-size: 0.95rem;
            padding: 10px 22px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sync-toggle:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        .sync-prompt {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .sync-prompt input {
            padding: 10px 16px;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-family: 'Georgia', serif;
            outline: none;
            min-width: 240px;
        }

        .sync-prompt button {
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            font-family: 'Georgia', serif;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
        }

        .sync-prompt .sync-go {
            background: white;
            color: #8B1538;
        }

        .sync-prompt .sync-cancel {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .sync-status {
            color: white;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .sync-status .sync-off {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: underline;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
        }

        .sync-note {
            font-size: 0.82rem;
            opacity: 0.75;
        }

        /* Grid of workshop panels */
        .workshop-grid {
            max-width: 1100px;
            margin: 0 auto 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 25px;
            align-items: start;
        }

        .workshop-panel {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: box-shadow 0.3s, transform 0.3s;
        }

        .workshop-panel:hover {
            box-shadow: 0 14px 38px rgba(0, 0, 0, 0.28);
            transform: translateY(-3px);
        }

        /* ==================== */
        /* Snazzy entrance      */
        /* ==================== */

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(22px) scale(0.98); }
            to   { opacity: 1; transform: none; }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-14px); }
            to   { opacity: 1; transform: none; }
        }

        /* Header elements ease in on load */
        .workshop-eyebrow { animation: fadeDown 0.6s ease both; }
        .workshop-title   { animation: fadeDown 0.6s ease 0.08s both; }
        .workshop-subtitle{ animation: fadeDown 0.6s ease 0.16s both; }
        .sync-bar         { animation: fadeDown 0.6s ease 0.24s both; }

        /* Tiles rise in, staggered (delay set inline per tile on first render) */
        .workshop-panel.rise { animation: riseIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .add-panel.rise      { animation: riseIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both; }

        /* A soft glow pulse on the eyebrow badge for a touch of polish */
        .workshop-eyebrow {
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.0);
            animation: fadeDown 0.6s ease both, badgeGlow 3.5s ease-in-out 0.8s infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.0); }
            50%      { box-shadow: 0 0 22px 2px rgba(255, 255, 255, 0.28); }
        }

        /* Respect users who prefer reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .workshop-eyebrow, .workshop-title, .workshop-subtitle, .sync-bar,
            .workshop-panel.rise, .add-panel.rise {
                animation: none !important;
            }
        }

        .workshop-panel.open {
            transform: translateY(-2px);
        }

        /* Panel header (the clickable tile face) */
        .panel-header {
            display: flex;
            align-items: center;
            gap: 18px;
            width: 100%;
            padding: 26px 26px;
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            font-family: 'Georgia', serif;
            transition: background 0.25s;
        }

        .panel-header:hover {
            background: #f8f9ff;
        }

        .panel-icon {
            flex-shrink: 0;
            width: 62px;
            height: 62px;
            border-radius: 14px;
            background: linear-gradient(135deg, #8B1538 0%, #5C0F28 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 4px 12px rgba(139, 21, 56, 0.3);
        }

        .panel-heading {
            flex: 1;
            min-width: 0;
        }

        .panel-heading h2 {
            color: #8B1538;
            font-size: 1.4rem;
            margin-bottom: 4px;
            line-height: 1.25;
        }

        .panel-heading p {
            color: #888;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .panel-chevron {
            flex-shrink: 0;
            color: #8B1538;
            font-size: 1.3rem;
            transition: transform 0.3s;
        }

        .workshop-panel.open .panel-chevron {
            transform: rotate(180deg);
        }

        /* Panel body — the part that "unfolds" */
        .panel-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .panel-body-inner {
            padding: 0 26px 26px;
        }

        .panel-body-inner::before {
            content: '';
            display: block;
            height: 1px;
            background: #eee;
            margin-bottom: 20px;
        }

        /* Links inside a panel */
        .panel-links {
            list-style: none;
            display: grid;
            gap: 10px;
        }

        .panel-links li {
            display: flex;
            align-items: stretch;
            gap: 6px;
        }

        .panel-links li a {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #f8f9ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            font-size: 1.02rem;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }

        /* Remove-a-link ("depopulate") button — a clearly visible red button */
        .link-remove {
            flex-shrink: 0;
            width: 48px;
            border: 1.5px solid #d98ca0;
            border-radius: 10px;
            background: #fbe4ea; /* light red so it stands out from the link */
            color: #8B1538;
            font-size: 1.2rem;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .link-remove:hover,
        .link-remove:focus {
            background: #8B1538;
            color: white;
            border-color: #8B1538;
            transform: scale(1.06);
        }

        /* In-section link editor ("populate") */
        .link-editor {
            margin-top: 14px;
        }

        .panel-add-link {
            width: 100%;
            padding: 11px;
            background: none;
            border: 1px dashed #cbd0f0;
            border-radius: 10px;
            color: #5a5f9e;
            font-family: 'Georgia', serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .panel-add-link:hover {
            background: #f0f1ff;
            border-color: #8B1538;
            color: #8B1538;
        }

        .link-form {
            margin-top: 10px;
            padding: 14px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .link-form .link-form-row {
            display: grid;
            grid-template-columns: 52px 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .link-form input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Georgia', serif;
            outline: none;
        }

        .link-form input:focus {
            border-color: #8B1538;
        }

        .link-form-actions {
            display: flex;
            gap: 8px;
        }

        .link-form-actions button {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 50px;
            font-family: 'Georgia', serif;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
        }

        .link-form-actions .lf-add {
            background: #8B1538;
            color: white;
        }

        .link-form-actions .lf-cancel {
            background: #eee;
            color: #666;
        }

        .panel-links li a:hover {
            background: #f0f1ff;
            border-left-color: #8B1538;
            transform: translateX(4px);
        }

        .panel-links .link-emoji {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .panel-links .link-label {
            flex: 1;
            font-weight: 600;
        }

        .panel-links .link-note {
            color: #999;
            font-size: 0.85rem;
            font-style: italic;
        }

        .panel-add-note {
            margin-top: 16px;
            font-size: 0.85rem;
            color: #aaa;
            font-style: italic;
            text-align: center;
        }

        /* Delete control on custom (user-added) panels */
        .panel-delete {
            margin-top: 14px;
            width: 100%;
            padding: 10px;
            background: none;
            border: 1px dashed #d9b3bf;
            border-radius: 10px;
            color: #8B1538;
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .panel-delete:hover {
            background: #fbeef1;
            border-style: solid;
        }

        /* "Add a new area" tile */
        .add-panel {
            background: rgba(255, 255, 255, 0.12);
            border: 2px dashed rgba(255, 255, 255, 0.55);
            border-radius: 18px;
            overflow: hidden;
            transition: background 0.25s;
        }

        .add-panel:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .add-panel-header {
            display: flex;
            align-items: center;
            gap: 18px;
            width: 100%;
            padding: 26px;
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            font-family: 'Georgia', serif;
            color: white;
        }

        .add-panel-header .panel-icon {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .add-panel-header h2 {
            font-size: 1.35rem;
            margin-bottom: 4px;
        }

        .add-panel-header p {
            font-size: 0.95rem;
            opacity: 0.85;
        }

        .add-form {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .add-form-inner {
            padding: 0 24px 24px;
        }

        .add-form label {
            display: block;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            margin: 14px 0 6px;
        }

        .add-form input {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            outline: none;
        }

        .add-link-row {
            display: grid;
            grid-template-columns: 52px 1fr 1.3fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .add-link-row input {
            padding: 10px;
        }

        .add-form-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .add-btn {
            flex: 1;
            min-width: 130px;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Georgia', serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-btn.primary {
            background: white;
            color: #8B1538;
        }

        .add-btn.primary:hover {
            transform: translateY(-2px);
        }

        .add-btn.ghost {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .add-btn.ghost:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .add-link-more {
            background: none;
            border: none;
            color: white;
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 6px 0;
            opacity: 0.9;
            text-decoration: underline;
        }

        .add-form-error {
            color: #ffd7d7;
            font-size: 0.9rem;
            margin-top: 10px;
            min-height: 1.1em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .workshop-title {
                font-size: 2.2rem;
            }
            .workshop-subtitle {
                font-size: 1.1rem;
            }
            .workshop-grid {
                grid-template-columns: 1fr;
            }
            .panel-header {
                padding: 22px 20px;
            }
            .panel-body-inner {
                padding: 0 20px 22px;
            }
        }
    </style>
</head>

    <!-- Workshop Grid -->
    <main class="workshop-grid">

        <!-- All sections render here (built-in + your own), fully editable -->
        <div id="sections" style="display: contents;"></div>

                    <input type="text" id="newTitle" placeholder="e.g. Fitness, Travel, Family…" maxlength="60">

                    <label for="newIcon">Emoji (optional)</label>
                    <input type="text" id="newIcon" placeholder="🎯" maxlength="4">

                    <label for="newSubtitle">Short description (optional)</label>
                    <input type="text" id="newSubtitle" placeholder="A line about this area" maxlength="80">

                    <label>Links <span style="font-weight: normal; opacity: 0.8;">(name + web address)</span></label>
                    <div id="newLinks">
                        <div class="add-link-row">
                            <input type="text" class="link-in-emoji" placeholder="🔗" maxlength="4">
                            <input type="text" class="link-in-label" placeholder="Link name">
                            <input type="text" class="link-in-url" placeholder="https://...">

                    </div>

                    <div class="add-form-error" id="addError"></div>

                    <div class="add-form-actions">

                </div>
            </div>
        </section>

    </main>

    <footer class="footer">

            <div class="footer-links">
                <a href="index.html" class="footer-link">Home</a>
                <a href="workshop.html" class="footer-link">Workshop</a>
                <a href="#" class="footer-link">Contact</a>
            </div>
        </div>
        <p class="footer-text">&copy; 2026 Billy Daws. | "I will lift up my eyes to the hills."</p>
    </footer>

    <script>
        // Mobile Navigation Toggle
        function toggleNav() {
            document.getElementById('navLinks').classList.toggle('active');
        }

        // Unfold / fold a workshop panel
        function togglePanel(button) {
            const panel = button.closest('.workshop-panel');
            const body = panel.querySelector('.panel-body');
            const isOpen = panel.classList.toggle('open');

            button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');

            if (isOpen) {
                body.style.maxHeight = body.scrollHeight + 'px';
            } else {
                body.style.maxHeight = '0';
            }
        }

        // Keep an open panel sized correctly if the window resizes
        window.addEventListener('resize', function () {
            document.querySelectorAll('.workshop-panel.open .panel-body').forEach(function (body) {
                body.style.maxHeight = body.scrollHeight + 'px';
            });
        });

        /* ==================== */
        /* Sections data model  */
        /* Every section (built-in + your own) lives here, is editable,     */
        /* and — when sync is on — follows you across devices.              */
        /* ==================== */

        const STORAGE_KEY = 'billyWorkshopSections';
        const LEGACY_KEY = 'billyWorkshopCustomPanels';
        const SYNC_KEY_STORAGE = 'billyWorkshopSyncKey';

        // The starting set of sections, used the first time you open the page.
        const DEFAULT_SECTIONS = [
            { id: 'podcast', icon: '🎙️', title: 'Billy Daws Workshop', subtitle: 'Your podcast — record, edit, publish', links: [

                { emoji: '🎚️', label: 'Recording & Editing', url: '#', note: 'Riverside / Descript' },
                { emoji: '📝', label: 'Show Notes & Scripts', url: '#', note: 'episode docs' },
                { emoji: '📅', label: 'Episode Calendar', url: '#', note: 'guests & schedule' }
            ]},
            { id: 'budget', icon: '💰', title: 'Budget & Finances', subtitle: 'All your financial elements, unfolded', links: [
                { emoji: '📊', label: 'Budget Spreadsheet', url: '#', note: 'monthly plan' },
                { emoji: '🏦', label: 'Bank Dashboard', url: '#', note: 'accounts' },
                { emoji: '📈', label: 'Investments', url: '#', note: 'portfolio' },
                { emoji: '🧾', label: 'Bills & Subscriptions', url: '#', note: 'recurring' }
            ]},
            { id: 'ai', icon: '🧠', title: 'Artificial Intelligence', subtitle: 'Your AI tools, plus news & learning', links: [
                { emoji: '🧠', label: 'Claude', url: 'https://claude.ai', note: 'Anthropic' },
                { emoji: '💬', label: 'ChatGPT', url: 'https://chatgpt.com', note: 'OpenAI' },
                { emoji: '✨', label: 'Gemini', url: 'https://gemini.google.com', note: 'Google' },
                { emoji: '🎨', label: 'Image & Video AI', url: '#', note: 'Midjourney / etc.' },
                { emoji: '📰', label: 'The Batch', url: 'https://www.deeplearning.ai/the-batch/', note: 'weekly AI news' },
                { emoji: '🎓', label: 'DeepLearning.AI', url: 'https://www.deeplearning.ai', note: 'courses' },
                { emoji: '🤗', label: 'Hugging Face', url: 'https://huggingface.co', note: 'models & datasets' },
                { emoji: '📄', label: 'arXiv (cs.AI)', url: 'https://arxiv.org/list/cs.AI/recent', note: 'latest research' },
                { emoji: '💬', label: 'r/artificial', url: 'https://www.reddit.com/r/artificial/', note: 'community' }
            ]},
            { id: 'sermon', icon: '📖', title: 'Sermon Study', subtitle: 'Scripture, commentary & prep', links: [
                { emoji: '📕', label: 'Bible Gateway', url: 'https://www.biblegateway.com', note: 'read & compare' },
                { emoji: '🔎', label: 'Blue Letter Bible', url: 'https://www.blueletterbible.org', note: 'original languages' },
                { emoji: '📚', label: 'Bible Hub', url: 'https://www.biblehub.com', note: 'commentaries' },
                { emoji: '✍️', label: 'Sermon Notes', url: '#', note: 'your outlines' }
            ]},
            { id: 'devotion', icon: '🙏', title: 'Personal Devotion', subtitle: 'Your daily time with God', links: [
                { emoji: '📖', label: 'YouVersion Bible', url: 'https://www.bible.com', note: 'read & plans' },
                { emoji: '📅', label: 'Bible in a Year', url: 'https://www.bible.com/reading-plans', note: 'reading plan' },
                { emoji: '🕊️', label: 'Prayer Journal', url: '#', note: 'your prayers' },
                { emoji: '🎧', label: 'Worship & Prayer', url: '#', note: 'playlist' }
            ]},
            { id: 'health', icon: '💪', title: 'Personal Health', subtitle: 'Fitness, nutrition & wellbeing', links: [
                { emoji: '🏃', label: 'Activity & Workouts', url: '#', note: 'Strava / Fitbit' },
                { emoji: '🥗', label: 'Nutrition & Meals', url: '#', note: 'food log' },
                { emoji: '😴', label: 'Sleep', url: '#', note: 'rest tracker' },
                { emoji: '🧘', label: 'Mind & Meditation', url: '#', note: 'Calm / Headspace' },
                { emoji: '🩺', label: 'Medical & Appointments', url: '#', note: 'patient portal' }
            ]},
            { id: 'news', icon: '📰', title: 'Favorite News Agencies', subtitle: 'Your trusted sources in one place', links: [
                { emoji: '🌐', label: 'Associated Press', url: 'https://apnews.com', note: 'apnews.com' },
                { emoji: '📡', label: 'Reuters', url: 'https://www.reuters.com', note: 'reuters.com' },
                { emoji: '🇬🇧', label: 'BBC News', url: 'https://www.bbc.com/news', note: 'bbc.com' }
            ]},
            { id: 'trends', icon: '📈', title: 'Trends', subtitle: "What's rising on YouTube & Spotify", links: [
                { emoji: '▶️', label: 'YouTube Trending', url: 'https://www.youtube.com/feed/trending', note: "what's hot now" },
                { emoji: '🎬', label: 'YouTube Charts', url: 'https://charts.youtube.com', note: 'top videos & music' },
                { emoji: '🎵', label: 'Spotify Charts', url: 'https://charts.spotify.com', note: 'top songs & podcasts' },
                { emoji: '🎙️', label: 'Spotify Podcast Charts', url: 'https://podcastcharts.byspotify.com', note: 'trending shows' }
            ]}
        ];

        function clone(obj) {
            return JSON.parse(JSON.stringify(obj));
        }

        function esc(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // Only allow safe link targets (http/https or same-page anchors)
        function safeUrl(url) {
            const u = String(url || '').trim();
            if (!u) return '#';
            if (/^https?:\/\//i.test(u)) return u;
            if (u.charAt(0) === '#' || u.charAt(0) === '/') return u;
            return 'https://' + u; // assume they typed a bare domain
        }

        // Read the saved sections (null if this browser has never saved any).
        function readSaved() {
            try {
                const arr = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (Array.isArray(arr)) return arr;
            } catch (e) {}
            return null;
        }

        // Build the first-run set: defaults + any areas saved under the old key.
        function seedSections() {
            const seed = clone(DEFAULT_SECTIONS);
            try {
                const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY));
                if (Array.isArray(legacy)) {
                    const ids = {};
                    seed.forEach(function (s) { ids[s.id] = true; });
                    legacy.forEach(function (s) { if (s && !ids[s.id]) seed.push(s); });
                }
            } catch (e) {}
            return seed;
        }

        // Track which default sections have already been offered to this
        // browser, so a NEW default (e.g. Artificial Intelligence added in a
        // later update) appears once for existing users — but a default the
        // user deliberately deleted never comes back.
        const SEEDED_KEY = 'billyWorkshopSeededDefaults';
        let backfillAdded = false;

        function getSeededDefaults() {
            try {
                const a = JSON.parse(localStorage.getItem(SEEDED_KEY));
                if (Array.isArray(a)) return a;
            } catch (e) {}
            return null;
        }

        // Add any brand-new default sections that this browser hasn't seen yet.
        function backfillDefaults(sections) {
            backfillAdded = false;
            let seeded = getSeededDefaults();
            if (seeded === null) {
                // First run of this version on pre-existing data: treat the
                // defaults already present as "seen" so we don't duplicate them.
                const present = {};
                sections.forEach(function (x) { present[x.id] = true; });
                seeded = DEFAULT_SECTIONS.filter(function (d) { return present[d.id]; })
                    .map(function (d) { return d.id; });
            }
            const seededSet = {};
            seeded.forEach(function (id) { seededSet[id] = true; });
            const existing = {};
            sections.forEach(function (x) { existing[x.id] = true; });

            DEFAULT_SECTIONS.forEach(function (d) {
                if (!seededSet[d.id] && !existing[d.id]) {
                    sections.push(clone(d));
                    backfillAdded = true;
                }
                seededSet[d.id] = true;
            });

            localStorage.setItem(SEEDED_KEY, JSON.stringify(Object.keys(seededSet)));
            if (backfillAdded) persistLocal(sections);
            return sections;
        }

        // One-time merge of the former "Explore AI" (id 'ai') and
        // "Artificial Intelligence" (id 'artificial-intelligence') sections
        // into a single 'ai' section. Idempotent: does nothing once merged.
        let migrationChanged = false;
        function migrateMergeAI(sections) {
            const mlIdx = sections.findIndex(function (s) { return s.id === 'artificial-intelligence'; });
            if (mlIdx === -1) return sections; // already merged / never existed
            const ml = sections[mlIdx];
            const ai = sections.find(function (s) { return s.id === 'ai'; });

            if (!ai) {
                // No tools section — just fold the AI section into id 'ai'.
                ml.id = 'ai';
            } else {
                ai.links = ai.links || [];
                const seen = {};
                ai.links.forEach(function (l) {
                    seen[(l.label || '').toLowerCase() + '|' + (l.url || '').toLowerCase()] = true;
                });
                (ml.links || []).forEach(function (l) {
                    const k = (l.label || '').toLowerCase() + '|' + (l.url || '').toLowerCase();
                    if (!seen[k]) { ai.links.push(l); seen[k] = true; }
                });
                // Rebrand to the combined identity only if the tools section
                // still carries its old default title (i.e. user hasn't renamed it).
                if (ai.title === 'Explore AI') {
                    ai.title = 'Artificial Intelligence';
                    ai.subtitle = 'Your AI tools, plus news & learning';
                    ai.icon = '🧠';
                }
                sections.splice(mlIdx, 1);
            }
            migrationChanged = true;
            persistLocal(sections);
            return sections;
        }

        // Always returns a usable array, seeding + saving on the very first run.
        function getSections() {
            migrationChanged = false;
            let s = readSaved();
            if (s === null) {
                s = seedSections();
                persistLocal(s);
                localStorage.setItem(SEEDED_KEY, JSON.stringify(DEFAULT_SECTIONS.map(function (d) { return d.id; })));
                backfillAdded = false;
                return s;
            }
            s = backfillDefaults(s);
            s = migrateMergeAI(s);
            return s;
        }

        function persistLocal(sections) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sections));
        }

        // Save locally (instant) and, if sync is on, push to the cloud too.
        function saveSections(sections) {
            persistLocal(sections);
            pushToCloud(sections);
        }

        function getSyncKey() {
            return (localStorage.getItem(SYNC_KEY_STORAGE) || '').trim();
        }

        // Coerce to the exact shape the backend expects, so a stray/missing
        // field never fails the cloud save.
        function sanitizePanels(sections) {
            return (sections || []).map(function (p) {
                return {
                    id: String(p.id || ''),
                    icon: String(p.icon || '🎯'),
                    title: String(p.title || ''),
                    subtitle: String(p.subtitle || ''),
                    links: (p.links || []).map(function (l) {
                        const out = {
                            emoji: String(l.emoji || '🔗'),
                            label: String(l.label || ''),
                            url: String(l.url || '')
                        };
                        if (l.note) out.note = String(l.note);
                        return out;
                    })
                };
            });
        }

        /* ==================== */
        /* Rendering            */
        /* ==================== */

        let hasAnimatedIn = false;

        function renderSections(openId) {
            const container = document.getElementById('sections');
            const sections = getSections();
            // Only play the staggered entrance on the very first render, not on
            // every edit-triggered re-render.
            const animate = !hasAnimatedIn;

            container.innerHTML = sections.map(function (p, idx) {
                const riseClass = animate ? ' rise' : '';
                const riseStyle = animate ? ' style="animation-delay:' + (idx * 70) + 'ms"' : '';
                const links = (p.links || []).map(function (l, i) {
                    const note = l.note ? '<span class="link-note">' + esc(l.note) + '</span>' : '';
                    return '<li>' +
                        '<a href="' + esc(safeUrl(l.url)) + '" target="_blank" rel="noopener">' +
                            '<span class="link-emoji">' + esc(l.emoji || '🔗') + '</span>' +
                            '<span class="link-label">' + esc(l.label || 'Link') + '</span>' + note +
                        '</a>' +
                        '<button class="link-remove" title="Remove this link" ' +
                            'onclick="removeLink(\'' + esc(p.id) + '\', ' + i + ')">✕</button>' +
                    '</li>';
                }).join('');

                const emptyNote = links ? '' :
                    '<li style="list-style:none;"><span style="color:#999;font-style:italic;padding:4px;">No links yet — add one below.</span></li>';

                return '<section class="workshop-panel' + riseClass + '" data-id="' + esc(p.id) + '"' + riseStyle + '>' +
                    '<button class="panel-header" onclick="togglePanel(this)" aria-expanded="false">' +
                        '<span class="panel-icon">' + esc(p.icon || '🎯') + '</span>' +
                        '<span class="panel-heading"><h2>' + esc(p.title) + '</h2>' +
                        '<p>' + esc(p.subtitle || '') + '</p></span>' +
                        '<span class="panel-chevron">⌄</span>' +
                    '</button>' +
                    '<div class="panel-body"><div class="panel-body-inner">' +
                        '<ul class="panel-links">' + links + emptyNote + '</ul>' +
                        '<div class="link-editor">' +
                            '<button class="panel-add-link" onclick="addLinkStart(this)">＋ Add a link to this area</button>' +
                            '<div class="link-form" style="display:none;">' +
                                '<div class="link-form-row">' +
                                    '<input class="lf-emoji" placeholder="🔗" maxlength="4">' +
                                    '<input class="lf-label" placeholder="Link name">' +
                                '</div>' +
                                '<div class="link-form-row" style="grid-template-columns:1fr;">' +
                                    '<input class="lf-url" placeholder="https://...">' +
                                '</div>' +
                                '<div class="link-form-row" style="grid-template-columns:1fr;">' +
                                    '<input class="lf-note" placeholder="Short note (optional)">' +
                                '</div>' +
                                '<div class="link-form-actions">' +
                                    '<button class="lf-add" onclick="addLinkSave(\'' + esc(p.id) + '\', this)">Add link</button>' +
                                    '<button class="lf-cancel" onclick="addLinkCancel(this)">Cancel</button>' +
                                '</div>' +
                            '</div>' +
                        '</div>' +
                        '<button type="button" class="panel-delete" onclick="deleteSection(\'' + esc(p.id) + '\')">Remove this whole area</button>' +
                    '</div></div>' +
                '</section>';
            }).join('');

            if (animate) {
                // Let the add-panel tile ride in after the sections.
                const addPanel = document.getElementById('addPanel');
                if (addPanel) addPanel.classList.add('rise');
                hasAnimatedIn = true;
            }

            if (openId) openPanelById(openId);
        }

        function openPanelById(id) {
            const panel = document.querySelector('#sections .workshop-panel[data-id="' + (window.CSS && CSS.escape ? CSS.escape(id) : id) + '"]');
            if (!panel) return;
            const body = panel.querySelector('.panel-body');
            panel.classList.add('open');
            panel.querySelector('.panel-header').setAttribute('aria-expanded', 'true');
            body.style.maxHeight = body.scrollHeight + 'px';
        }

        // Recompute the height of the open panel that contains `el`.
        function resizeContainingPanel(el) {
            const body = el.closest('.panel-body');
            if (body) body.style.maxHeight = body.scrollHeight + 'px';
        }

        /* ==================== */
        /* Populate / depopulate */
        /* ==================== */

        function findSection(sections, id) {
            for (let i = 0; i < sections.length; i++) {
                if (sections[i].id === id) return sections[i];
            }
            return null;
        }

        function addLinkStart(button) {
            const form = button.nextElementSibling;
            button.style.display = 'none';
            form.style.display = 'block';
            const label = form.querySelector('.lf-label');
            if (label) label.focus();
            resizeContainingPanel(form);
        }

        function addLinkCancel(button) {
            const editor = button.closest('.link-editor');
            editor.querySelector('.link-form').style.display = 'none';
            editor.querySelector('.panel-add-link').style.display = 'block';
            resizeContainingPanel(editor);
        }

        function addLinkSave(id, button) {
            const form = button.closest('.link-form');
            const label = form.querySelector('.lf-label').value.trim();
            const url = form.querySelector('.lf-url').value.trim();
            const emoji = form.querySelector('.lf-emoji').value.trim();
            const note = form.querySelector('.lf-note').value.trim();

            if (!label && !url) {
                form.querySelector('.lf-label').focus();
                return;
            }

            const sections = getSections();
            const section = findSection(sections, id);
            if (!section) return;
            if (!section.links) section.links = [];
            const link = { emoji: emoji || '🔗', label: label || url, url: url };
            if (note) link.note = note;
            section.links.push(link);

            saveSections(sections);
            renderSections(id); // re-render and re-open this section
        }

        function removeLink(id, index) {
            const sections = getSections();
            const section = findSection(sections, id);
            if (!section || !section.links) return;
            section.links.splice(index, 1);
            saveSections(sections);
            renderSections(id);
        }

        function deleteSection(id) {
            const msg = getSyncKey()
                ? 'Remove this whole area? It will be removed from all your synced devices.'
                : 'Remove this whole area? This only affects this browser.';
            if (!confirm(msg)) return;
            const sections = getSections().filter(function (p) { return p.id !== id; });
            saveSections(sections);
            renderSections();
        }

        /* ==================== */
        /* Add a brand-new area */
        /* ==================== */

        function toggleAddForm() {
            const panel = document.getElementById('addPanel');
            const form = document.getElementById('addForm');
            const header = panel.querySelector('.add-panel-header');
            const isOpen = panel.classList.toggle('open');
            header.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            const chevron = header.querySelector('.panel-chevron');
            chevron.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
            chevron.style.transition = 'transform 0.3s';
            form.style.maxHeight = isOpen ? form.scrollHeight + 'px' : '0';
        }

        function addLinkRow() {
            const row = document.createElement('div');
            row.className = 'add-link-row';
            row.innerHTML =
                '<input type="text" class="link-in-emoji" placeholder="🔗" maxlength="4">' +
                '<input type="text" class="link-in-label" placeholder="Link name">' +
                '<input type="text" class="link-in-url" placeholder="https://...">';
            document.getElementById('newLinks').appendChild(row);
            const form = document.getElementById('addForm');
            form.style.maxHeight = form.scrollHeight + 'px';
        }

        function saveNewPanel() {
            const title = document.getElementById('newTitle').value.trim();
            const error = document.getElementById('addError');
            if (!title) {
                error.textContent = 'Please give your new area a name.';
                return;
            }
            error.textContent = '';

            const links = [];
            document.querySelectorAll('#newLinks .add-link-row').forEach(function (row) {
                const label = row.querySelector('.link-in-label').value.trim();
                const url = row.querySelector('.link-in-url').value.trim();
                const emoji = row.querySelector('.link-in-emoji').value.trim();
                if (label || url) {
                    links.push({ emoji: emoji || '🔗', label: label || url, url: url });
                }
            });

            const sections = getSections();
            const newId = 'custom_' + Date.now().toString(36) + '_' + title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            sections.push({
                id: newId,
                icon: document.getElementById('newIcon').value.trim() || '🎯',
                title: title,
                subtitle: document.getElementById('newSubtitle').value.trim(),
                links: links
            });
            saveSections(sections);
            renderSections(newId);

            document.getElementById('newTitle').value = '';
            document.getElementById('newIcon').value = '';
            document.getElementById('newSubtitle').value = '';
            document.getElementById('newLinks').innerHTML =
                '<div class="add-link-row">' +
                '<input type="text" class="link-in-emoji" placeholder="🔗" maxlength="4">' +
                '<input type="text" class="link-in-label" placeholder="Link name">' +
                '<input type="text" class="link-in-url" placeholder="https://...">' +
                '</div>';
            toggleAddForm();
        }

        /* ==================== */
        /* Cross-device sync    */
        /* ==================== */

        // Push the full section set to Convex (no-op if sync is off or offline).
        async function pushToCloud(sections) {
            const key = getSyncKey();
            if (!key || !window.convexClient) return;
            try {
                await window.convexClient.mutation('workshop:savePanels', {
                    syncKey: key,
                    panels: sanitizePanels(sections)
                });
                flashSyncStatus('☁️ Saved to your account');
            } catch (e) {
                console.warn('Cloud save failed — kept on this device.', e);
                flashSyncStatus('⚠️ Offline — saved on this device');
            }
        }

        function openSyncPrompt() {
            document.getElementById('syncToggle').style.display = 'none';
            document.getElementById('syncPrompt').style.display = 'flex';
            document.getElementById('syncEmail').focus();
        }

        function closeSyncPrompt() {
            document.getElementById('syncPrompt').style.display = 'none';
            updateSyncUI();
        }

        function updateSyncUI(tempMsg) {
            const key = getSyncKey();
            const toggle = document.getElementById('syncToggle');
            const prompt = document.getElementById('syncPrompt');
            const status = document.getElementById('syncStatus');

            if (key) {
                toggle.style.display = 'none';
                prompt.style.display = 'none';
                status.style.display = 'flex';
                status.innerHTML =
                    '<span>' + esc(tempMsg || ('☁️ Synced as ' + key)) + '</span>' +
                    '<button class="sync-off" onclick="disableSync()">Turn off sync</button>' +
                    '<span class="sync-note">Open this page on another device and sync with the same email.</span>';
            } else {
                status.style.display = 'none';
                prompt.style.display = 'none';
                toggle.style.display = 'inline-block';
            }
        }

        let syncFlashTimer = null;
        function flashSyncStatus(msg) {
            if (!getSyncKey()) return;
            updateSyncUI(msg);
            if (syncFlashTimer) clearTimeout(syncFlashTimer);
            syncFlashTimer = setTimeout(function () { updateSyncUI(); }, 2500);
        }

        async function enableSync() {
            const email = document.getElementById('syncEmail').value.trim().toLowerCase();
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!re.test(email)) {
                alert('Please enter a valid email address to sync.');
                return;
            }
            localStorage.setItem(SYNC_KEY_STORAGE, email);
            updateSyncUI('☁️ Turning on sync…');

            if (!window.convexClient) {
                updateSyncUI('☁️ Sync on — will connect when online');
                return;
            }

            try {
                // Merge cloud + this device's areas so nothing is lost.
                const cloud = await window.convexClient.query('workshop:getPanels', { syncKey: email });
                const local = getSections();
                let merged = Array.isArray(cloud) ? cloud.slice() : [];
                const ids = {};
                merged.forEach(function (p) { ids[p.id] = true; });
                local.forEach(function (p) { if (!ids[p.id]) merged.push(p); });
                // Apply the AI-section merge to the combined set too, so a
                // pre-merge cloud copy doesn't reintroduce the split section.
                merged = migrateMergeAI(merged);

                persistLocal(merged);
                renderSections();
                await window.convexClient.mutation('workshop:savePanels', {
                    syncKey: email,
                    panels: sanitizePanels(merged)
                });
                updateSyncUI();
            } catch (e) {
                console.warn('Could not reach your account.', e);
                updateSyncUI('⚠️ Sync on, but offline — saved on this device');
            }
        }

        function disableSync() {
            if (!confirm('Turn off sync on this device? Your areas stay here, but new changes will not sync until you turn it back on.')) return;
            localStorage.removeItem(SYNC_KEY_STORAGE);
            updateSyncUI();
        }

        async function pullFromCloud() {
            const key = getSyncKey();
            if (!key || !window.convexClient) return;
            try {
                const cloud = await window.convexClient.query('workshop:getPanels', { syncKey: key });
                if (Array.isArray(cloud) && cloud.length > 0) {
                    persistLocal(cloud);
                }
                // Reconcile: add any brand-new default sections the cloud copy
                // predates, then push the reconciled set back up if it changed.
                const reconciled = getSections();
                renderSections();
                updateSyncUI();
                if (backfillAdded || migrationChanged) pushToCloud(reconciled);
            } catch (e) {
                console.warn('Sync refresh failed — showing this device\'s copy.', e);
                updateSyncUI('⚠️ Offline — showing this device\'s copy');
            }
        }

        /* ==================== */
        /* Startup              */
        /* ==================== */

        // 1) Render instantly from local storage (seeding defaults on first run).
        renderSections();
        updateSyncUI();

        // 2) Once the Convex client has settled, refresh from the cloud.
        function onConvexReady() {
            if (getSyncKey()) pullFromCloud();
        }
        if (window.convexClient) {
            onConvexReady();
        } else {
            window.addEventListener('convex-ready', onConvexReady, { once: true });
        }
    </script>
</body>
